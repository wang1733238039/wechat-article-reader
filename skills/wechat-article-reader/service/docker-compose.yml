# WeChat Download API - Docker Compose
# Usage: docker-compose up -d
#
# First time setup:
#   1. Copy env.example to .env: cp env.example .env
#   2. Edit .env and set SITE_URL to your actual URL
#   3. Run: docker-compose up -d
#   4. Visit http://localhost:5001/login.html to scan QR code
#
# Note for NAS users (Synology/QNAP):
#   If you encounter permission issues, run on NAS:
#   - chmod -R 777 ./data
#   - Credentials are automatically saved to ./data directory

services:
  wechat-api:
    image: wang1733238039/wechat-article-reader:latest
    # Or build locally:
    # build: .
    container_name: wechat-article-reader
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      # Persist SQLite database and credentials
      - ./data:/app/data
      # Config file (read-only - credentials saved to data/)
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
