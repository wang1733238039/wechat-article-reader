<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信搜一搜 - WeChat Download API</title>
    <style>
        :root {
            --green: #07c160;
            --green-dark: #06ad56;
            --green-light: rgba(7, 193, 96, 0.08);
            --blue: #5767e8;
            --red: #dc2626;
            --orange: #f59e0b;
            --text: #1f2329;
            --muted: #667085;
            --subtle: #98a2b3;
            --line: #e5e7eb;
            --soft: #f6f7f9;
            --white: #fff;
            --shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
            --radius: 10px;
            --radius-sm: 6px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--soft);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Search Header */
        .search-header {
            background: var(--white);
            border-bottom: 1px solid var(--line);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .search-header-inner {
            width: min(760px, calc(100% - 32px));
            margin: 0 auto;
            padding: 14px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            flex-shrink: 0;
        }
        .back-btn:hover { background: var(--soft); color: var(--text); }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-input {
            width: 100%;
            height: 42px;
            border: 1px solid var(--line);
            border-radius: 21px;
            padding: 0 44px 0 16px;
            font-size: 15px;
            background: var(--soft);
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: var(--green);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(7, 193, 96, 0.12);
        }
        .search-input::placeholder { color: var(--subtle); }
        .search-icon-btn {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border: none;
            background: var(--green);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
        }
        .search-icon-btn:hover { background: var(--green-dark); }
        .search-icon-btn:disabled { background: var(--subtle); cursor: not-allowed; }

        /* Page Title Bar */
        .page-bar {
            width: min(760px, calc(100% - 32px));
            margin: 0 auto;
            padding: 16px 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }
        .page-title span {
            color: var(--green);
        }
        .page-hint {
            font-size: 12px;
            color: var(--subtle);
        }
        .page-hint a {
            color: var(--green);
            text-decoration: none;
        }

        /* Main Layout */
        .container {
            width: min(760px, calc(100% - 32px));
            margin: 0 auto;
            padding-bottom: 40px;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .stat-pill {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 13px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-pill strong { color: var(--green); }

        /* Filter row */
        .filter-row {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-label {
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap;
        }
        .filter-btn {
            height: 30px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 15px;
            background: var(--white);
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--green); color: var(--green); }
        .filter-btn.active {
            background: var(--green-light);
            border-color: rgba(7, 193, 96, 0.3);
            color: var(--green);
            font-weight: 700;
        }

        /* Article Card */
        .article-card {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.15s;
            cursor: pointer;
        }
        .article-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }
        .article-card-body {
            padding: 16px 16px 12px;
        }
        .article-source {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .source-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--soft);
        }
        .source-name {
            font-size: 13px;
            color: #53658f;
            font-weight: 600;
        }
        .source-time {
            font-size: 12px;
            color: var(--subtle);
            margin-left: auto;
        }
        .article-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .article-card:hover .article-title { color: var(--green); }
        .article-digest {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-card-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--soft);
            display: flex;
            gap: 8px;
        }
        .action-btn {
            height: 28px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: var(--white);
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.15s;
        }
        .action-btn:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .action-btn.primary {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }
        .action-btn.primary:hover {
            background: var(--green-dark);
            border-color: var(--green-dark);
            color: #fff;
        }

        /* Account Chips */
        .account-chips {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .account-chips-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }
        .chips-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .account-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px 5px 6px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--soft);
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            font-size: 13px;
            color: var(--text);
        }
        .account-chip:hover {
            border-color: var(--green);
            background: var(--green-light);
            color: var(--green);
        }
        .account-chip img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }
        .account-chip .count {
            font-size: 11px;
            color: var(--subtle);
        }

        /* Empty / Loading / Error states */
        .state-box {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 60px 20px;
            text-align: center;
        }
        .state-box .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        .state-box .msg {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 20px;
        }
        .state-box .hint {
            color: var(--subtle);
            font-size: 13px;
        }
        .state-box.loading .icon { animation: spin 1s linear infinite; }
        .state-box.error { border-color: rgba(220, 38, 38, 0.2); }
        .state-box.error .icon { opacity: 0.6; }
        .state-box.error .msg { color: var(--red); }

        /* Inline loading */
        .loading-inline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 40px;
            color: var(--muted);
            font-size: 14px;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--line);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Article Content Panel */
        .article-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--white);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .article-panel.visible { display: flex; }
        .article-panel-head {
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: var(--white);
        }
        .article-panel-head .close-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--soft);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--muted);
        }
        .article-panel-head .close-btn:hover { background: var(--line); }
        .article-panel-title {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .article-panel-link {
            padding: 6px 12px;
            background: var(--green);
            color: #fff;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .article-panel-link:hover { background: var(--green-dark); color: #fff; }
        .article-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.9;
        }
        .article-panel-body img { max-width: 100%; height: auto; border-radius: 4px; }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--text);
            color: #fff;
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-size: 14px;
            transition: transform 0.24s ease;
            pointer-events: none;
            z-index: 999;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Page navigation */
        .page-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            padding-bottom: 20px;
        }

        @media (max-width: 600px) {
            .article-title { font-size: 15px; }
            .page-title { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Search Header -->
    <div class="search-header">
        <div class="search-header-inner">
            <button class="back-btn" onclick="history.back()" title="返回">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div class="search-box">
                <input
                    id="keywordInput"
                    class="search-input"
                    type="text"
                    placeholder="搜索文章内容..."
                    value=""
                    onkeydown="if(event.key==='Enter')doSearch()"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>
            <button id="searchBtn" class="search-icon-btn" onclick="doSearch()" title="搜索">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </div>

    <div class="page-bar">
        <div class="page-title">微信<span>搜一搜</span></div>
        <div class="page-hint">来自微信后台 · <a href="/admin.html">管理面板</a></div>
    </div>

    <div class="container" id="mainContainer">

        <!-- Empty state -->
        <div id="emptyState" class="state-box">
            <div class="icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--subtle)">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
            <div class="msg">输入关键词，立即搜索全网公众号文章</div>
            <div class="hint">支持任意关键词，如：AI、投资、房产政策、新能源汽车...</div>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="state-box loading" style="display:none">
            <div class="icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>
            <div class="msg" id="loadingMsg">正在搜索中...</div>
        </div>

        <!-- Error state -->
        <div id="errorState" class="state-box error" style="display:none">
            <div class="icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <div class="msg" id="errorMsg"></div>
            <div class="hint">请检查登录状态或稍后重试</div>
        </div>

        <!-- Results -->
        <div id="resultsArea" style="display:none">

            <!-- Stats + filters -->
            <div class="stats-bar" id="statsBar"></div>

            <!-- Matched accounts -->
            <div id="accountChips" class="account-chips" style="display:none">
                <div class="account-chips-title">发现相关公众号</div>
                <div class="chips-wrap" id="chipsWrap"></div>
            </div>

            <!-- Article list -->
            <div id="articleList"></div>
        </div>

    </div>

    <!-- Article content panel -->
    <div id="articlePanel" class="article-panel">
        <div class="article-panel-head">
            <button class="close-btn" onclick="closePanel()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="article-panel-title" id="panelTitle"></div>
            <a id="panelLink" class="article-panel-link" href="#" target="_blank" rel="noopener">打开原文</a>
        </div>
        <div id="panelBody" class="article-panel-body">
            <div class="loading-inline"><span class="spinner"></span>正在获取文章正文...</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        var currentKeyword = '';
        var currentResults = null;

        // ===== Utility Functions =====
        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
        function escAttr(s) {
            return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() { t.classList.remove('show'); }, 2000);
        }
        function setBtnLoading(id, loading, text) {
            var btn = document.getElementById(id);
            btn.disabled = loading;
            if (loading) {
                btn.innerHTML = '<span class="spinner" style="border-top-color:#fff;border-color:rgba(255,255,255,0.3)"></span>';
            } else {
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>';
            }
        }
        function formatTime(ts) {
            if (!ts) return '';
            var d = new Date(ts * 1000);
            var now = new Date();
            var diff = (now - d) / 1000;
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 86400 * 7) return Math.floor(diff / 86400) + '天前';
            return d.toLocaleDateString('zh-CN');
        }

        // ===== State Management =====
        function showState(which) {
            ['emptyState', 'loadingState', 'errorState', 'resultsArea'].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.style.display = (id === which) ? 'block' : 'none';
            });
        }

        // ===== Main Search =====
        async function doSearch() {
            var keyword = document.getElementById('keywordInput').value.trim();
            if (!keyword) {
                showToast('请输入搜索关键词');
                return;
            }
            currentKeyword = keyword;
            setBtnLoading('searchBtn', true);
            showState('loadingState');
            document.getElementById('loadingMsg').textContent = '正在搜索 "' + escHtml(keyword) + '" ...';
            try {
                var res = await fetch('/api/search-all/articles?' + new URLSearchParams({
                    keyword: keyword,
                    max_accounts: 10,
                    articles_per_account: 5
                }));
                var data = await res.json();
                if (!data.success) {
                    showState('errorState');
                    document.getElementById('errorMsg').textContent = data.error || '搜索失败';
                } else {
                    currentResults = data.data;
                    renderResults(data.data, keyword);
                    showState('resultsArea');
                }
            } catch (e) {
                showState('errorState');
                document.getElementById('errorMsg').textContent = '网络错误：' + e.message;
            }
            setBtnLoading('searchBtn', false);
        }

        // ===== Render Results =====
        function renderResults(data, keyword) {
            var accounts = data.accounts || [];
            var articles = data.articles || [];
            var errors = data.errors || [];

            // Stats bar
            var statsBar = document.getElementById('statsBar');
            statsBar.innerHTML =
                '<div class="stat-pill">发现 <strong>' + accounts.length + '</strong> 个相关公众号</div>' +
                '<div class="stat-pill">共找到 <strong>' + articles.length + '</strong> 篇文章</div>' +
                (errors.length ? '<div class="stat-pill" style="color:var(--orange)">部分请求失败: ' + errors.length + ' 个</div>' : '');

            // Account chips
            var chipsArea = document.getElementById('accountChips');
            var chipsWrap = document.getElementById('chipsWrap');
            if (accounts.length > 0) {
                chipsArea.style.display = 'block';
                chipsWrap.innerHTML = accounts.map(function(acc) {
                    var count = data.author_totals && data.author_totals[acc.fakeid] ? data.author_totals[acc.fakeid] : 0;
                    var avatar = acc.round_head_img || '';
                    return '<a class="account-chip" href="/search.html" title="' + escAttr(acc.nickname) + '">' +
                        '<img src="' + escAttr(avatar) + '" alt="" onerror="this.style.display=\'none\'">' +
                        '<span>' + escHtml(acc.nickname) + '</span>' +
                        (count ? '<span class="count">(' + count + '篇)</span>' : '') +
                        '</a>';
                }).join('');
            } else {
                chipsArea.style.display = 'none';
            }

            // Article list
            var list = document.getElementById('articleList');
            if (articles.length === 0) {
                list.innerHTML = '' +
                    '<div class="state-box">' +
                    '  <div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></div>' +
                    '  <div class="msg">未找到相关文章</div>' +
                    '  <div class="hint">试试其他关键词，或检查登录状态是否正常</div>' +
                    '</div>';
                return;
            }

            list.innerHTML = articles.map(function(article) {
                var link = escAttr(article.link || '');
                var title = escHtml(article.title || '无标题');
                var digest = escHtml(article.digest || '');
                var source = escHtml(article.source || '');
                var alias = escAttr(article.alias || '');
                var avatar = escAttr(article.source && accounts.length ? (accounts.find(function(a) { return a.nickname === article.source; }) || {}).round_head_img : '');
                var time = formatTime(article.update_time || article.create_time);

                return '<div class="article-card" onclick="window.open(\'' + link + '\', \'_blank\')">' +
                    '<div class="article-card-body">' +
                    '<div class="article-source">' +
                    (avatar ? '<img class="source-avatar" src="' + avatar + '" alt="" onerror="this.style.display=\'none\'">' : '') +
                    '<span class="source-name">' + source + '</span>' +
                    (alias ? '<span style="color:var(--subtle);font-size:12px">@' + escHtml(alias) + '</span>' : '') +
                    (time ? '<span class="source-time">' + time + '</span>' : '') +
                    '</div>' +
                    '<div class="article-title">' + title + '</div>' +
                    (digest ? '<div class="article-digest">' + digest + '</div>' : '') +
                    '</div>' +
                    '<div class="article-card-footer" onclick="event.stopPropagation()">' +
                    '<button class="action-btn primary" onclick="viewArticle(\'' + link + '\', \'' + escAttr(article.title || '') + '\')">查看正文</button>' +
                    '<a class="action-btn" href="' + link + '" target="_blank" rel="noopener noreferrer">打开链接</a>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        // ===== Article Content Panel =====
        async function viewArticle(url, title) {
            if (!url) return;
            var panel = document.getElementById('articlePanel');
            panel.classList.add('visible');
            document.getElementById('panelTitle').textContent = title || '文章正文';
            document.getElementById('panelLink').href = url;
            document.getElementById('panelBody').innerHTML = '<div class="loading-inline"><span class="spinner"></span>正在获取文章正文...</div>';
            panel.scrollTop = 0;
            try {
                var res = await fetch('/api/article', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                var data = await res.json();
                if (data.success && data.data && data.data.content) {
                    document.getElementById('panelBody').innerHTML = data.data.content;
                } else {
                    document.getElementById('panelBody').innerHTML =
                        '<div style="text-align:center;padding:40px;color:var(--red);font-size:15px">' +
                        '获取失败：' + escHtml(data.error || '未知错误') + '</div>';
                }
            } catch (e) {
                document.getElementById('panelBody').innerHTML =
                    '<div style="text-align:center;padding:40px;color:var(--red);font-size:15px">网络错误</div>';
            }
        }
        function closePanel() {
            document.getElementById('articlePanel').classList.remove('visible');
        }

        // ===== Auto-focus =====
        window.addEventListener('load', function() {
            document.getElementById('keywordInput').focus();
            // Check URL param for auto-search
            var params = new URLSearchParams(window.location.search);
            var kw = params.get('q') || params.get('keyword');
            if (kw) {
                document.getElementById('keywordInput').value = kw;
                doSearch();
            }
        });
    </script>
</body>
</html>
